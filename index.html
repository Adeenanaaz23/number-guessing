<!DOCTYPE html>
<html>
<head>
    <title>Number Guessing Game</title>

    <!-- IMPORTANT FOR MOBILE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MENU -->
<div id="menu" class="container">
    <h1>🎮 Number Guessing Game</h1>

    <button onclick="newGame()">New Game</button>
    <button onclick="resumeGame()">Resume</button>
    <button onclick="showHighScores()">Highest Score</button>
    <button onclick="showOptions()">More Options</button>
</div>

<!-- GAME -->
<div id="game" class="container" style="display:none;">
    <h2>Guess Number (1-100)</h2>

    <input type="number" id="guess" placeholder="Enter number">
    <button onclick="checkGuess()">Guess</button>

    <p id="result"></p>

    <button onclick="goMenu()">Back</button>
</div>

<!-- HIGH SCORES -->
<div id="scores" class="container" style="display:none;">
    <h2>🏆 Highest Scores</h2>
    <ul id="scoreList"></ul>
    <button onclick="goMenu()">Back</button>
</div>

<!-- OPTIONS -->
<div id="options" class="container" style="display:none;">
    <h2>⚙️ More Options</h2>

    <button onclick="setTheme('dark')">🌙 Dark Theme</button>
    <button onclick="setTheme('light')">☀ Light Theme</button>
    <button onclick="clearScores()">🧹 Clear Scores</button>
    <button onclick="changeRange()">🔢 Change Range</button>

    <button onclick="goMenu()">Back</button>
</div>

<script src="script.js"></script>
</body>
</html>
